<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="320">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="body" x1="150" y1="80" x2="450" y2="280">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="600" height="320" rx="16" fill="url(#bg)"/>
  <!-- Controller body -->
  <ellipse cx="300" cy="185" rx="170" ry="110" fill="url(#body)" filter="url(#shadow)"/>
  <ellipse cx="300" cy="185" rx="170" ry="110" fill="none" stroke="#444" stroke-width="1.5"/>
  <!-- Left grip -->
  <ellipse cx="165" cy="235" rx="50" ry="65" fill="#222" stroke="#444" stroke-width="1"/>
  <!-- Right grip -->
  <ellipse cx="435" cy="235" rx="50" ry="65" fill="#222" stroke="#444" stroke-width="1"/>
  <!-- Xbox button -->
  <circle cx="300" cy="165" r="12" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="300" y="169" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#7fba00">X</text>
  <!-- Y button (top) -->
  <circle cx="390" cy="135" r="18" fill="#1a1a1a" stroke="#d4a017" stroke-width="2.5" filter="url(#glow)"/>
  <text x="390" y="141" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#d4a017">Y</text>
  <!-- X button (left) -->
  <circle cx="362" cy="165" r="18" fill="#1a1a1a" stroke="#0e6eb8" stroke-width="2.5" filter="url(#glow)"/>
  <text x="362" y="171" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#0e6eb8">X</text>
  <!-- B button (right) -->
  <circle cx="418" cy="165" r="18" fill="#1a1a1a" stroke="#e74856" stroke-width="2.5" filter="url(#glow)"/>
  <text x="418" y="171" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e74856">B</text>
  <!-- A button (bottom) -->
  <circle cx="390" cy="195" r="18" fill="#1a1a1a" stroke="#7fba00" stroke-width="2.5" filter="url(#glow)"/>
  <text x="390" y="201" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#7fba00">A</text>
  <!-- Left trigger -->
  <rect x="155" y="78" width="60" height="22" rx="6" fill="#333" stroke="#666" stroke-width="1.5"/>
  <text x="185" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#aaa">LT</text>
  <!-- Right trigger -->
  <rect x="385" y="78" width="60" height="22" rx="6" fill="#333" stroke="#666" stroke-width="1.5"/>
  <text x="415" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#aaa">RT</text>
  <!-- Left stick -->
  <circle cx="230" cy="175" r="22" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <circle cx="230" cy="175" r="14" fill="#252525" stroke="#444" stroke-width="1"/>
  <!-- D-pad -->
  <rect x="205" y="215" width="12" height="36" rx="2" fill="#333" stroke="#555" stroke-width="0.8"/>
  <rect x="193" y="227" width="36" height="12" rx="2" fill="#333" stroke="#555" stroke-width="0.8"/>
  <!-- Right stick -->
  <circle cx="350" cy="225" r="22" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <circle cx="350" cy="225" r="14" fill="#252525" stroke="#444" stroke-width="1"/>
  <!-- Labels -->
  <!-- A label -->
  <line x1="390" y1="215" x2="390" y2="260" stroke="#7fba0088" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="350" y="260" width="80" height="22" rx="4" fill="#7fba0022" stroke="#7fba00" stroke-width="0.8"/>
  <text x="390" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#7fba00">Again</text>
  <!-- B label -->
  <line x1="438" y1="165" x2="490" y2="155" stroke="#e7485688" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="490" y="143" width="80" height="22" rx="4" fill="#e7485622" stroke="#e74856" stroke-width="0.8"/>
  <text x="530" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e74856">Hard</text>
  <!-- X label -->
  <line x1="343" y1="165" x2="290" y2="155" stroke="#0e6eb888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="490" y="173" width="80" height="22" rx="4" fill="#0e6eb822" stroke="#0e6eb8" stroke-width="0.8"/>
  <text x="530" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#0e6eb8">Good</text>
  <!-- Y label -->
  <line x1="390" y1="115" x2="390" y2="55" stroke="#d4a01788" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="350" y="33" width="80" height="22" rx="4" fill="#d4a01722" stroke="#d4a017" stroke-width="0.8"/>
  <text x="390" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#d4a017">Easy</text>
  <!-- LT label -->
  <line x1="185" y1="76" x2="185" y2="40" stroke="#aaa8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="135" y="18" width="100" height="22" rx="4" fill="#ffffff11" stroke="#aaa" stroke-width="0.8"/>
  <text x="185" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#aaa">🔊 Replay</text>
  <!-- RT label -->
  <line x1="415" y1="76" x2="415" y2="12" stroke="#aaa8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="370" y="3" width="90" height="22" rx="4" fill="#ffffff11" stroke="#aaa" stroke-width="0.8"/>
  <text x="415" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#aaa">↩ Undo</text>
  <!-- X label line fix -->
  <line x1="343" y1="165" x2="290" y2="182" stroke="#0e6eb888" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
